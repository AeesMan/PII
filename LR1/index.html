<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">CMS</div>
        <div class="header-right">
            <div class="dropdown" id="notif-dropdown">
                <div class="notification-container">
                    <i class="fa-regular fa-bell"></i>
                    <span class="pulse-dot"></span>
                </div>
                <div class="dropdown-content notif-box">
                    <div class="notif-item"><i class="fa-solid fa-circle-user"></i> <div><strong>Admin</strong><p>Waiting to approve...</p></div></div>
                    <div class="notif-item"><i class="fa-solid fa-circle-user"></i> <div><strong>John K.</strong><p>New comment added</p></div></div>
                </div>
            </div>

            <div class="dropdown" id="profile-dropdown">
                <div class="user-info">
                    <i class="fa-regular fa-circle-user avatar-icon"></i>
                    <span class="user-name">Han Solo</span>
                </div>
                <div class="dropdown-content profile-box">
                    <a href="#">Profile</a>
                    <a href="#">Log Out</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#" class="active">Students</a></li>
                <li><a href="#">Tasks</a></li>
            </ul>
        </nav>

        <main class="content">
            <div class="content-header">
                <h1>Students</h1>
                <button class="add-btn" id="open-add-modal">+</button>
            </div>

            <table id="students-table">
                <thead>
                    <tr>
                        <th><input type="checkbox"></th>
                        <th>Group</th>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Birthday</th>
                        <th>Status</th>
                        <th>Options</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>KN-21</td>
                        <td>John Smith</td>
                        <td>M</td>
                        <td>11.05.2004</td>
                        <td><span class="dot green"></span></td>
                        <td>
                            <button class="icon-btn edit-row"><i class="fa-solid fa-pen"></i></button> 
                            <button class="icon-btn delete-row"><i class="fa-solid fa-xmark"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination">
                <button>&lt;</button>
                <button class="active">1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>&gt;</button>
            </div>
        </main>
    </div>

    <div id="student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add student</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <label>Group</label>
                    <select id="st-group"><option>KN-21</option><option>KN-22</option></select>
                </div>
                <div class="form-row"><label>First name</label><input type="text" id="st-fname"></div>
                <div class="form-row"><label>Last name</label><input type="text" id="st-lname"></div>
                <div class="form-row">
                    <label>Gender</label>
                    <select id="st-gender"><option>Male</option><option>Female</option></select>
                </div>
                <div class="form-row"><label>Birthday</label><input type="date" id="st-birth"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel close-modal">Cancel</button>
                <button class="btn-confirm" id="save-student">Create</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Warning</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <p id="delete-text">Are you sure you want to delete user?</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel close-modal">Cancel</button>
                <button class="btn-confirm" id="confirm-delete">Ok</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
